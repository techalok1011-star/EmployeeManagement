name: Keep Render instance awake

# Pings /health every ~10 minutes, but only during 06:00-22:00 IST (00:30-16:30 UTC).
# Outside that window the cron is simply not scheduled, so the free Render instance
# is allowed to idle-sleep overnight - it wakes again on the first ping after 06:00 IST
# (or on the first real visitor, with the usual cold-start delay).
on:
  workflow_dispatch: {}
  schedule:
    - cron: '30,40,50 0 * * *'   # 06:00-06:20 IST
    - cron: '*/10 1-15 * * *'    # 06:30-21:20 IST
    - cron: '0,10,20,30 16 * * *' # 21:30-22:00 IST

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        # --max-time is generous (not 20s) because the very first ping after the
        # overnight sleep window has to cold-start the whole JVM/Spring context on
        # Render's free 0.1-vCPU tier, which routinely takes 30-60s+ - a short
        # timeout here just fails a perfectly fine wake-up and spams failure email.
        # --retry covers the rare case a single attempt still isn't enough.
        run: curl -fsS --max-time 90 --retry 2 --retry-delay 10 https://employeemanagement-q6h3.onrender.com/health
