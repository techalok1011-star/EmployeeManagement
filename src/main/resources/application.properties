# Server
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/empdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=3071

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Party Excel Import
party.import.on-startup=true
party.excel.path=Party_wise_Sales_Summary.xlsx
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.empmgmt=DEBUG

# ── WhatsApp Business Cloud API ────────────────────────────────────────────────
# mode: LOG_ONLY (default, simulates sends) | LIVE (calls Meta API for real)
whatsapp.mode=LOG_ONLY
# Paste your Meta permanent access token here when going LIVE:
whatsapp.access-token=
# Your WhatsApp Business phone number ID from Meta dashboard:
whatsapp.phone-number-id=
# Approved template name (register on Meta Business Manager):
whatsapp.template-name=payment_reminder
whatsapp.template-language=en
