# Local secrets (gitignored) — overrides whatsapp.access-token etc. Falls back silently if absent.
spring.config.import=optional:application-local.properties

# Server
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,text/javascript,application/json
server.compression.min-response-size=1024

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/empdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=3071

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Party Excel Import
party.import.on-startup=true
party.excel.path=Party_wise_Sales_Summary.xlsx
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.empmgmt=DEBUG

# ── Initial user seeding (DataSeeder, only runs once against an empty users table) ─────────────
# Set real values in application-local.properties (gitignored). Falls back to placeholders that
# won't match anything you'd guess, so the app still boots cleanly without the local file.
# seed.admin-password=
# seed.employee-password=

# ── WhatsApp Business Cloud API ────────────────────────────────────────────────
# mode: LOG_ONLY (default, simulates sends) | LIVE (calls Meta API for real)
whatsapp.mode=LIVE
# Real token lives in application-local.properties (gitignored, not committed) — set it there:
whatsapp.access-token=
# Your WhatsApp Business phone number ID from Meta dashboard:
whatsapp.phone-number-id=1172787229255136
# Approved template name (register on Meta Business Manager):
#whatsapp.template-name=payment_reminder
whatsapp.template-name=hello_world
#whatsapp.template-language=en
whatsapp.template-language=en_US
