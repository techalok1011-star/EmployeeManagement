<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayTrack — Sign In</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#161a24">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}"/>
    <script th:src="@{/js/theme.js}"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, var(--surface) 0%, var(--ink) 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(108,142,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,142,255,0.035) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 40%, transparent 90%);
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
            animation: riseIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }
        .brand-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .brand-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 21px;
            box-shadow: 0 8px 24px rgba(108,142,255,0.35);
        }
        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 29px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .brand-name span {
            color: var(--accent);
        }
        .brand-tagline {
            color: var(--muted);
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
            overflow: hidden;
            animation: riseIn 0.6s 0.1s cubic-bezier(0.16,1,0.3,1) both;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .card-subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13.5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: riseIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
        }
        .alert-error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; animation: shake 0.4s; }
        .alert-success { background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.3); color: #6ee7b7; }
        @keyframes shake {
            10%, 90% { transform: translateX(-1px); }
            20%, 80% { transform: translateX(2px); }
            30%, 50%, 70% { transform: translateX(-4px); }
            40%, 60% { transform: translateX(4px); }
        }

        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
            border-radius: 10px;
            transition: box-shadow 0.2s;
        }
        .input-wrap:focus-within {
            box-shadow: 0 0 0 3px rgba(108,142,255,0.15);
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.2s;
        }
        .input-wrap:focus-within .input-icon { color: var(--accent); }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 42px 12px 42px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        input::placeholder { color: var(--muted); }

        .toggle-pw {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-size: 15px;
            padding: 8px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
            font-family: inherit;
        }
        .toggle-pw:hover { color: var(--text); background: var(--overlay-3); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            margin-top: 8px;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(108,142,255,0.35); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.75; cursor: default; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: var(--backdrop);
            backdrop-filter: blur(3px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            z-index: 20;
            animation: riseIn 0.25s cubic-bezier(0.16,1,0.3,1) both;
        }
        .login-overlay.show { display: flex; }
        .login-overlay .spinner-lg {
            width: 34px; height: 34px;
            border: 3px solid var(--overlay-6);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .login-overlay .overlay-text {
            font-family: 'Syne', sans-serif;
            font-size: 14.5px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .footer-note {
            text-align: center;
            margin-top: 22px;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 0.3px;
            animation: riseIn 0.6s 0.2s cubic-bezier(0.16,1,0.3,1) both;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle light/dark theme" style="position:fixed;top:20px;right:20px;z-index:20">☀️</button>
    <div class="grid-overlay"></div>

    <div class="login-wrapper">
        <div class="brand">
            <div class="brand-logo">
                <div class="brand-icon">💳</div>
                <div class="brand-name">Pay<span>Track</span></div>
            </div>
            <div class="brand-tagline">Payment Entry Management System</div>
        </div>

        <div class="card">
            <div class="card-title">Welcome back</div>
            <div class="card-subtitle">Sign in to your account to continue</div>

            <div th:if="${errorMsg}" class="alert alert-error">
                ⚠️ <span th:text="${errorMsg}"></span>
            </div>
            <div th:if="${logoutMsg}" class="alert alert-success">
                ✓ <span th:text="${logoutMsg}"></span>
            </div>

            <form th:action="@{/login}" method="post" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁</button>
                    </div>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="spinner" id="loginSpinner"></span>
                    <span id="loginBtnText">Sign In →</span>
                </button>
            </form>

            <div class="login-overlay" id="loginOverlay">
                <div class="spinner-lg"></div>
                <div class="overlay-text">Signing you in…</div>
            </div>
        </div>

        <div class="footer-note">PayTrack &middot; Role-based access for admins &amp; employees</div>
    </div>

    <script>
        const pwInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePw');
        toggleBtn.addEventListener('click', () => {
            const show = pwInput.type === 'password';
            pwInput.type = show ? 'text' : 'password';
            toggleBtn.textContent = show ? '🙈' : '👁';
            toggleBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        });

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');

        let submitting = false;
        loginForm.addEventListener('submit', (e) => {
            if (submitting) { e.preventDefault(); return; }
            e.preventDefault();
            submitting = true;
            document.getElementById('loginSpinner').style.display = 'inline-block';
            document.getElementById('loginBtnText').textContent = 'Signing in…';
            loginBtn.disabled = true;
            // readOnly, not disabled — disabled fields are dropped from the submitted
            // form data, which would send the request with no username/password.
            usernameInput.readOnly = true;
            pwInput.readOnly = true;
            document.getElementById('loginOverlay').classList.add('show');
            // On some mobile browsers, submitting in the same tick can navigate away
            // before this loading state ever paints — a same-tick form submit doesn't
            // guarantee a frame renders first (desktop browsers are more forgiving here).
            // A short setTimeout yields to the browser so it can paint before we hand
            // off to the real navigation. Deliberately NOT requestAnimationFrame here —
            // rAF only fires while the page is actively rendering, so on a backgrounded/
            // inactive tab it can simply never fire, leaving the form stuck on "Signing
            // in…" forever with no submission ever happening (verified while testing this).
            setTimeout(() => loginForm.submit(), 50);
        });

        // If the page is restored from the back/forward cache (e.g. the user hits
        // "back" after logging out), reset the button instead of leaving it stuck
        // in a permanent "Signing in…" state with no request in flight.
        window.addEventListener('pageshow', (e) => {
            if (!e.persisted) return;
            submitting = false;
            loginBtn.disabled = false;
            usernameInput.readOnly = false;
            pwInput.readOnly = false;
            document.getElementById('loginSpinner').style.display = 'none';
            document.getElementById('loginBtnText').textContent = 'Sign In →';
            document.getElementById('loginOverlay').classList.remove('show');
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
        }
    </script>
</body>
</html>
