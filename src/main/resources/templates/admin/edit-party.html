<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Party — PayTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=DM+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--ink:#0d0f14;--surface:#161a24;--card:#1e2330;--border:#2a3045;--accent:#6c8eff;--accent2:#a78bfa;--gold:#f5c842;--green:#34d399;--red:#f87171;--orange:#fb923c;--text:#e2e8f0;--muted:#8892a4;--muted2:#4a556a}
        body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--text);min-height:100vh;display:flex}
        .sidebar{width:240px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
        .sidebar-brand{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
        .sidebar-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
        .sidebar-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--text)}
        .sidebar-title span{color:var(--accent)}
        .sidebar-user{padding:16px 20px;border-bottom:1px solid var(--border)}
        .sidebar-user-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-bottom:4px}
        .sidebar-user-name{font-size:14px;font-weight:500;color:var(--text)}
        .sidebar-user-role{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px;background:rgba(245,200,66,0.15);color:var(--gold)}
        .sidebar-nav{padding:16px 12px;flex:1}
        .nav-section-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);padding:0 8px;margin-bottom:6px;display:block;margin-top:12px}
        .nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;text-decoration:none;color:var(--muted);font-size:14px;font-weight:500;transition:all 0.15s;margin-bottom:2px}
        .nav-link:hover{background:rgba(255,255,255,0.05);color:var(--text)}
        .nav-link.active{background:rgba(108,142,255,0.12);color:var(--accent)}
        .sidebar-footer{padding:16px 12px;border-top:1px solid var(--border)}
        .logout-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);font-size:14px;font-weight:500;transition:all 0.15s;width:100%;cursor:pointer;background:transparent;border:none;font-family:'DM Sans',sans-serif}
        .logout-btn:hover{background:rgba(248,113,113,0.1);color:var(--red)}
        .main{margin-left:240px;flex:1}
        .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:14px}
        .topbar-back{color:var(--muted);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:5px;transition:color 0.15s}
        .topbar-back:hover{color:var(--text)}
        .topbar-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
        .content{padding:28px 32px;max-width:560px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px}
        .section-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:22px}
        .meta-row{display:flex;gap:8px;align-items:center;margin-bottom:20px;padding:12px 14px;background:var(--surface);border-radius:10px;border:1px solid var(--border)}
        .meta-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px}
        .meta-val{font-size:13px;font-family:monospace;color:var(--accent2)}
        .form-label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px;font-weight:600}
        .form-control{width:100%;padding:10px 13px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border-color 0.2s;margin-bottom:14px}
        .form-control:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,142,255,0.12)}
        .form-control::placeholder{color:var(--muted2)}
        .form-error{font-size:12px;color:var(--red);margin-bottom:10px;margin-top:-10px}
        .toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:20px}
        .toggle-label{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13.5px;color:var(--text)}
        .toggle-label input[type=checkbox]{accent-color:var(--green);width:16px;height:16px}
        .btn-row{display:flex;gap:10px}
        .btn{padding:10px 18px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
        .btn-primary:hover{opacity:0.88}
        .btn-ghost{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border)}
        .btn-ghost:hover{background:rgba(255,255,255,0.09)}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-icon">💳</div>
        <div class="sidebar-title">Pay<span>Track</span></div>
    </div>
    <div class="sidebar-user">
        <div class="sidebar-user-label">Signed in as</div>
        <div class="sidebar-user-name" th:text="${adminName}">Admin</div>
        <span class="sidebar-user-role">👑 Admin</span>
    </div>
    <nav class="sidebar-nav">
        <span class="nav-section-label">Administration</span>
        <a href="/admin/dashboard" class="nav-link"><span>📊</span> Dashboard</a>
        <a href="/admin/employees" class="nav-link"><span>👥</span> Employees</a>
        <a href="/admin/entries" class="nav-link"><span>📋</span> All Entries</a>
        <a href="/admin/parties" class="nav-link active"><span>🏢</span> Parties</a>
        <a href="/admin/invoices" class="nav-link"><span>🧾</span> Invoices</a>
        <a href="/admin/history" class="nav-link"><span>📜</span> Audit Log</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn"><span>🚪</span> Sign Out</button>
        </form>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <a href="/admin/parties" class="topbar-back">← Parties</a>
        <span class="topbar-title">✏️ Edit Party</span>
    </div>

    <div class="content">
        <div class="card">
            <div class="section-title">Edit Party Details</div>

            <!-- Current combined key -->
            <div class="meta-row">
                <div>
                    <div class="meta-label">Current combined key</div>
                    <div class="meta-val" th:text="${party.combined}"></div>
                </div>
            </div>

            <form th:action="@{/admin/parties/{id}/edit(id=${party.id})}" method="post"
                  th:object="${editRequest}" autocomplete="off">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <label class="form-label">Party Name <span style="color:var(--red)">*</span></label>
                <input type="text" class="form-control" th:field="*{name}"/>
                <div class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

                <label class="form-label">GSTIN <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted2)">(optional)</span></label>
                <input type="text" class="form-control" th:field="*{gstin}" placeholder="Leave blank if no GSTIN"/>
                <div class="form-error" th:if="${#fields.hasErrors('gstin')}" th:errors="*{gstin}"></div>

                <label class="form-label">WhatsApp Phone <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted2)">(E.164 format, e.g. 919876543210)</span></label>
                <input type="tel" class="form-control" th:field="*{phone}" placeholder="91XXXXXXXXXX"/>
                <div class="form-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>

                <div class="toggle-row">
                    <label class="toggle-label">
                        <input type="checkbox" th:field="*{whatsappOptIn}"/>
                        Enable WhatsApp outstanding reminders
                    </label>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn btn-primary">💾 Save Changes</button>
                    <a href="/admin/parties" class="btn btn-ghost">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
