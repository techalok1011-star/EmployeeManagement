<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All My Invoices — PayTrack</title>
    <link rel="manifest" href="/manager-manifest.json"/>
    <meta name="theme-color" content="#161a24"/>
    <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=DM+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/theme.css}"/>
    <script th:src="@{/js/theme.js}"></script>
    <style th:inline="none">
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family:'DM Sans',sans-serif; background:var(--ink); color:var(--text); min-height:100vh; display:flex; }
        .sidebar {
            width:240px; min-height:100vh; background:var(--surface);
            border-right:1px solid var(--border); display:flex; flex-direction:column;
            position:fixed; top:0; left:0; bottom:0; z-index:100;
        }
        .sidebar-brand { padding:24px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
        .sidebar-icon { width:36px; height:36px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; }
        .sidebar-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:var(--text); }
        .sidebar-title span { color:var(--accent); }
        .sidebar-user { padding:16px 20px; border-bottom:1px solid var(--border); }
        .sidebar-user-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted2); margin-bottom:4px; }
        .sidebar-user-name { font-size:14px; font-weight:500; color:var(--text); }
        .sidebar-user-role { font-size:11px; padding:2px 8px; border-radius:20px; display:inline-block; margin-top:4px; background:rgba(245,200,66,0.15); color:var(--gold); }
        .sidebar-nav { padding:16px 12px; flex:1; }
        .nav-section-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted2); padding:0 8px; margin-bottom:6px; display:block; margin-top:12px; }
        .nav-link { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; text-decoration:none; color:var(--muted); font-size:14px; font-weight:500; transition:all 0.15s; margin-bottom:2px; }
        .nav-link:hover { background:var(--overlay-3); color:var(--text); }
        .nav-link.active { background:rgba(108,142,255,0.12); color:var(--accent); }
        .sidebar-footer { padding:16px 12px; border-top:1px solid var(--border); }
        .logout-btn { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; text-decoration:none; color:var(--muted); font-size:14px; font-weight:500; transition:all 0.15s; width:100%; cursor:pointer; background:transparent; border:none; font-family:'DM Sans',sans-serif; }
        .logout-btn:hover { background:rgba(248,113,113,0.1); color:var(--red); }
        .main { margin-left:240px; flex:1; }
        .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; }
        .topbar-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; }
        .content { padding:28px 32px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
        .search-bar { display:flex; gap:10px; margin-bottom:18px; }
        .search-input { flex:1; padding:10px 14px; background:var(--surface); border:1.5px solid var(--border); border-radius:9px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; }
        .search-input:focus { border-color:var(--accent); }
        .search-input::placeholder { color:var(--muted2); }
        .table-wrapper { overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:12px; border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; }
        thead { background:var(--surface); }
        th { padding:11px 14px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); font-weight:600; border-bottom:1px solid var(--border); }
        td { padding:12px 14px; font-size:13.5px; border-bottom:1px solid var(--overlay-2); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:var(--overlay-1); }
        .badge { padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:500; display:inline-block; background:rgba(108,142,255,0.15); color:var(--accent); }
        .amount { font-weight:600; color:var(--green); }
        .text-muted { color:var(--muted); font-size:12px; }
        .empty-state { text-align:center; padding:40px 20px; color:var(--muted); }
        .empty-icon { font-size:36px; margin-bottom:10px; }
        .menu-toggle{display:none;background:var(--overlay-3);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:8px;font-size:18px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150}
        @media(max-width:768px){
            .sidebar{transform:translateX(-100%);transition:transform 0.25s ease;z-index:200}
            .sidebar.open{transform:translateX(0)}
            .main{margin-left:0}
            .menu-toggle{display:flex}
            .sidebar-overlay.open{display:block}
            .content{padding:16px}
            .card{padding:16px}
            .topbar{padding:12px 16px;flex-wrap:wrap;row-gap:6px}
            .topbar-title{font-size:16px}
            th,td{padding:9px 10px;font-size:12px}
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-icon">💳</div>
        <div class="sidebar-title">Pay<span>Track</span></div>
    </div>
    <div class="sidebar-user">
        <div class="sidebar-user-label">Signed in as</div>
        <div class="sidebar-user-name" th:text="${user.fullName}">Manager</div>
        <span class="sidebar-user-role">📦 Manager</span>
    </div>
    <nav class="sidebar-nav">
        <span class="nav-section-label">Main</span>
        <a href="/manager/dashboard" class="nav-link"><span>📊</span> Dashboard</a>
        <a href="/manager/invoices" class="nav-link active"><span>🧾</span> All My Invoices</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn"><span>🚪</span> Sign Out</button>
        </form>
    </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main">
    <div class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">☰</button>
        <span class="topbar-title">All My Invoices</span>
        <span style="font-size:13px;color:var(--muted)" th:text="${#lists.size(invoices)} + ' total'"></span>
        <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle light/dark theme">☀️</button>
    </div>
    <div class="content">
        <div class="card">
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by party name, invoice no..."/>
            </div>
            <div th:if="${#lists.isEmpty(invoices)}" class="empty-state">
                <div class="empty-icon">📭</div>
                <div>No invoices added yet.</div>
                <div style="font-size:12px;margin-top:6px;">Add your first invoice from the Dashboard.</div>
            </div>
            <div th:if="${!#lists.isEmpty(invoices)}" class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Invoice No.</th>
                            <th>Date</th>
                            <th>Party</th>
                            <th>Bags</th>
                            <th>Rate/Bag</th>
                            <th>Amount</th>
                            <th>Delivery</th>
                        </tr>
                    </thead>
                    <tbody id="invoicesTable">
                        <tr th:each="inv : ${invoices}">
                            <td th:text="${inv.invoiceNumber}"></td>
                            <td class="text-muted" th:text="${#temporals.format(inv.invoiceDate,'dd MMM yyyy')}"></td>
                            <td th:text="${inv.partyName}"></td>
                            <td class="text-muted" th:text="${inv.bags != null ? inv.bags : '—'}"></td>
                            <td class="text-muted" th:text="${inv.ratePerBag != null ? '₹' + inv.ratePerBag : '—'}"></td>
                            <td class="amount">₹<span th:text="${#numbers.formatDecimal(inv.amount, 1, 'COMMA', 2, 'POINT')}"></span></td>
                            <td><span class="badge" th:text="${inv.deliveryMode}"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('searchInput').addEventListener('input', function() {
        const q = this.value.toLowerCase();
        document.querySelectorAll('#invoicesTable tr').forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
    });

    function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('open');
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }
</script>
</body>
</html>
