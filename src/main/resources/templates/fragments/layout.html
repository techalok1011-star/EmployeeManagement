<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, sidebar)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">PayTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&amp;display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ink: #0d0f14; --surface: #161a24; --card: #1e2330; --border: #2a3045;
            --accent: #6c8eff; --accent2: #a78bfa; --gold: #f5c842; --green: #34d399;
            --red: #f87171; --orange: #fb923c;
            --text: #e2e8f0; --muted: #8892a4; --muted2: #4a556a;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--ink); color:var(--text); min-height:100vh; display:flex; }

        /* Sidebar */
        .sidebar {
            width: 240px; min-height: 100vh; background: var(--surface);
            border-right: 1px solid var(--border); display:flex; flex-direction:column;
            position: fixed; top:0; left:0; bottom:0; z-index:100;
        }
        .sidebar-brand {
            padding: 24px 20px; border-bottom: 1px solid var(--border);
            display:flex; align-items:center; gap:10px;
        }
        .sidebar-icon {
            width:36px; height:36px; background:linear-gradient(135deg,var(--accent),var(--accent2));
            border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px;
        }
        .sidebar-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:var(--text); }
        .sidebar-title span { color:var(--accent); }

        .sidebar-user {
            padding: 16px 20px; border-bottom: 1px solid var(--border);
        }
        .sidebar-user-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted2); margin-bottom:4px; }
        .sidebar-user-name { font-size:14px; font-weight:500; color:var(--text); }
        .sidebar-user-role {
            font-size:11px; padding:2px 8px; border-radius:20px; display:inline-block; margin-top:4px;
            background: rgba(108,142,255,0.15); color:var(--accent);
        }
        .sidebar-user-role.admin { background:rgba(245,200,66,0.15); color:var(--gold); }

        .sidebar-nav { padding: 16px 12px; flex:1; }
        .nav-section { margin-bottom:20px; }
        .nav-section-label {
            font-size:10px; text-transform:uppercase; letter-spacing:1px;
            color:var(--muted2); padding:0 8px; margin-bottom:6px;
        }
        .nav-link {
            display:flex; align-items:center; gap:10px; padding:10px 12px;
            border-radius:10px; text-decoration:none; color:var(--muted);
            font-size:14px; font-weight:500; transition:all 0.15s;
            margin-bottom:2px;
        }
        .nav-link:hover { background:rgba(255,255,255,0.05); color:var(--text); }
        .nav-link.active { background:rgba(108,142,255,0.12); color:var(--accent); }
        .nav-link .nav-icon { font-size:16px; width:20px; text-align:center; }

        .sidebar-footer {
            padding:16px 12px; border-top: 1px solid var(--border);
        }
        .logout-btn {
            display:flex; align-items:center; gap:10px; padding:10px 12px;
            border-radius:10px; text-decoration:none; color:var(--muted);
            font-size:14px; font-weight:500; transition:all 0.15s; width:100%; cursor:pointer;
            background:transparent; border:none; font-family:'DM Sans',sans-serif;
        }
        .logout-btn:hover { background:rgba(248,113,113,0.1); color:var(--red); }

        /* Main content */
        .main { margin-left:240px; flex:1; min-height:100vh; }
        .topbar {
            background:var(--surface); border-bottom:1px solid var(--border);
            padding:16px 32px; display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:50;
        }
        .topbar-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:var(--text); }
        .topbar-right { display:flex; align-items:center; gap:12px; }
        .topbar-date { font-size:13px; color:var(--muted); }

        .content { padding:28px 32px; }

        /* Cards */
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
        .card-sm { padding:20px; }

        /* Stats grid */
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
        .stat-card {
            background:var(--card); border:1px solid var(--border); border-radius:14px;
            padding:20px; position:relative; overflow:hidden;
        }
        .stat-card::before {
            content:''; position:absolute; top:-20px; right:-20px;
            width:80px; height:80px; border-radius:50%; opacity:0.08;
        }
        .stat-card.blue::before { background:var(--accent); }
        .stat-card.purple::before { background:var(--accent2); }
        .stat-card.gold::before { background:var(--gold); }
        .stat-card.green::before { background:var(--green); }
        .stat-label { font-size:12px; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); margin-bottom:8px; }
        .stat-value { font-family:'Syne',sans-serif; font-size:26px; font-weight:700; color:var(--text); }
        .stat-value.blue { color:var(--accent); }
        .stat-value.gold { color:var(--gold); }
        .stat-value.green { color:var(--green); }
        .stat-icon { font-size:24px; margin-bottom:8px; }

        /* Table */
        .table-wrapper { overflow-x:auto; border-radius:14px; border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; }
        thead { background:var(--surface); }
        th {
            padding:12px 16px; text-align:left; font-size:11px;
            text-transform:uppercase; letter-spacing:0.8px; color:var(--muted);
            font-weight:600; border-bottom:1px solid var(--border);
        }
        td { padding:13px 16px; font-size:14px; border-bottom:1px solid rgba(255,255,255,0.04); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(255,255,255,0.02); }

        /* Badges */
        .badge {
            padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:500;
            display:inline-block;
        }
        .badge-cash { background:rgba(52,211,153,0.15); color:var(--green); }
        .badge-cheque { background:rgba(108,142,255,0.15); color:var(--accent); }
        .badge-upi { background:rgba(167,139,250,0.15); color:var(--accent2); }
        .badge-neft { background:rgba(245,200,66,0.15); color:var(--gold); }
        .badge-rtgs { background:rgba(251,146,60,0.15); color:var(--orange); }
        .badge-bank { background:rgba(56,189,248,0.15); color:#38bdf8; }
        .badge-dd { background:rgba(248,113,113,0.15); color:var(--red); }
        .badge-active { background:rgba(52,211,153,0.15); color:var(--green); }
        .badge-inactive { background:rgba(248,113,113,0.15); color:var(--red); }

        /* Buttons */
        .btn {
            padding:9px 18px; border-radius:9px; font-family:'DM Sans',sans-serif;
            font-size:13.5px; font-weight:500; cursor:pointer; border:none;
            transition:all 0.15s; text-decoration:none; display:inline-flex; align-items:center; gap:6px;
        }
        .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; }
        .btn-primary:hover { opacity:0.88; transform:translateY(-1px); }
        .btn-sm { padding:6px 12px; font-size:12.5px; border-radius:7px; }
        .btn-danger { background:rgba(248,113,113,0.15); color:var(--red); border:1px solid rgba(248,113,113,0.3); }
        .btn-danger:hover { background:rgba(248,113,113,0.25); }
        .btn-ghost { background:rgba(255,255,255,0.05); color:var(--text); border:1px solid var(--border); }
        .btn-ghost:hover { background:rgba(255,255,255,0.08); }
        .btn-success { background:rgba(52,211,153,0.15); color:var(--green); border:1px solid rgba(52,211,153,0.3); }
        .btn-success:hover { background:rgba(52,211,153,0.25); }

        /* Forms */
        .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
        .form-group { margin-bottom:16px; }
        .form-label {
            display:block; font-size:12px; text-transform:uppercase; letter-spacing:0.8px;
            color:var(--muted); margin-bottom:7px; font-weight:600;
        }
        .form-control {
            width:100%; padding:11px 14px; background:var(--surface); border:1.5px solid var(--border);
            border-radius:9px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
            transition:border-color 0.2s, box-shadow 0.2s; outline:none;
        }
        .form-control:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(108,142,255,0.12); }
        .form-control::placeholder { color:var(--muted2); }
        .form-error { font-size:12px; color:var(--red); margin-top:5px; }

        /* Alerts */
        .alert { padding:12px 16px; border-radius:10px; font-size:13.5px; margin-bottom:20px; }
        .alert-success { background:rgba(52,211,153,0.1); border:1px solid rgba(52,211,153,0.3); color:#6ee7b7; }
        .alert-danger { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:#fca5a5; }

        /* Section headers */
        .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
        .section-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; color:var(--text); }
        .section-subtitle { font-size:13px; color:var(--muted); margin-top:2px; }

        /* Modal */
        .modal-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
            backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center;
        }
        .modal-overlay.open { display:flex; }
        .modal { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:32px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .modal-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; }
        .modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; }
        .modal-close:hover { color:var(--text); }

        /* Amount color */
        .amount { font-weight:600; font-family:'Syne',sans-serif; color:var(--green); }
        .text-muted { color:var(--muted); font-size:13px; }
        .mt-4 { margin-top:16px; }
        .mb-4 { margin-bottom:16px; }
        .flex { display:flex; }
        .items-center { align-items:center; }
        .gap-3 { gap:12px; }

        select.form-control option { background:var(--surface); }

        /* Responsive */
        @media(max-width:768px) {
            .sidebar { transform:translateX(-100%); }
            .main { margin-left:0; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-icon">💳</div>
            <div class="sidebar-title">Pay<span>Track</span></div>
        </div>
        <div class="sidebar-user">
            <div class="sidebar-user-label">Signed in as</div>
            <div class="sidebar-user-name" th:replace="${sidebar}">User Name</div>
        </div>
        <nav class="sidebar-nav" th:replace="${sidebar}">Nav placeholder</nav>
        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="logout-btn">
                    <span>🚪</span> Sign Out
                </button>
            </form>
        </div>
    </div>
    <div class="main">
        <div th:replace="${content}">Content here</div>
    </div>
</body>
</html>
