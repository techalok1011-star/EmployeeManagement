services:
  - type: web
    name: paytrack
    runtime: docker
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: WHATSAPP_MODE
        value: LOG_ONLY
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_EMPLOYEE_PASSWORD
        sync: false
